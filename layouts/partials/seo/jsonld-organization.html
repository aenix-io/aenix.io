{{/* JSON-LD Organization — emitted on every page */}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Organization",
  "@id": "{{ "/#org" | absURL }}",
  "name": "Aenix",
  "url": "{{ "/" | absURL }}",
  "logo": "{{ "img/aenix-logo.png" | absURL }}",
  "description": "Aenix is the team behind Cozystack — a CNCF Sandbox cloud platform. We deliver sovereign cloud, multi-tenant Kubernetes, and AI-ready infrastructure for regulated enterprises and cloud builders.",
  "foundingLocation": {
    "@type": "Place",
    "address": {
      "@type": "PostalAddress",
      "addressCountry": "NL"
    }
  },
  "sameAs": [
    "https://github.com/aenix-io",
    "https://www.linkedin.com/company/aenix-io",
    "https://cozystack.io"
  ],
  "founder": {
    "@type": "Person",
    "name": "Timur Tukaev"
  },
  "areaServed": ["EU", "DACH", "Central Asia", "MENA"]
}
</script>

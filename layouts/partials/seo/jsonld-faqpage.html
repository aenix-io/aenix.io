{{/* JSON-LD FAQPage — emitted whenever .Params.faq is present.

  Frontmatter shape:
  faq:
    - q: "Question text"
      a: "Answer text (30-80 words)"
    - q: "Another question"
      a: "Another answer"

  Minimum 4 entries enforced by seo/head.html validation. */}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {{- range $i, $item := .Params.faq -}}
      {{- if $i }},{{ end }}
      {
        "@type": "Question",
        "name": {{ index $item "q" | jsonify }},
        "acceptedAnswer": {
          "@type": "Answer",
          "text": {{ index $item "a" | jsonify }}
        }
      }
    {{- end }}
  ]
}
</script>

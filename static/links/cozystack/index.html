<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozystack</title>
<meta name="description" content="Cozystack — Free and open-source PaaS framework for building clouds">
<meta property="og:title" content="Cozystack">
<meta property="og:description" content="Free and open-source PaaS framework for building clouds">
<meta property="og:type" content="website">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script defer src="https://www.googletagmanager.com/gtag/js?id=GT-NMCJ23L"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','GT-NMCJ23L');</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #000;
    color: #fff;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 40px 16px 60px;
  }

  .container {
    width: 100%;
    max-width: 680px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .logo {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo img {
    width: 100%;
    height: auto;
  }

  .profile-name {
    font-size: 20px;
    font-weight: 700;
    text-align: center;
  }

  .profile-bio {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    text-align: center;
    line-height: 1.5;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 14px 20px;
    background: #222;
    border: none;
    border-radius: 8px;
    color: #fff;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: background 0.2s, transform 0.15s;
  }

  .link-btn:hover {
    background: #2a2a2a;
    transform: translateY(-1px);
  }

  .link-btn:active {
    transform: translateY(0);
  }

  .link-icon {
    width: 40px;
    height: 40px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
    color: rgba(255,255,255,0.8);
  }

  .link-text {
    flex: 1;
    min-width: 0;
  }

  .link-subtitle {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }

  .link-arrow {
    opacity: 0.3;
    flex-shrink: 0;
    font-size: 12px;
  }

  .footer {
    margin-top: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    text-align: center;
  }

  .footer a {
    color: rgba(255,255,255,0.35);
    text-decoration: none;
  }

  .footer a:hover {
    color: rgba(255,255,255,0.6);
  }
</style>
</head>
<body>

<div class="container">

  <div class="logo">
    <img src="https://raw.githubusercontent.com/cncf/artwork/main/projects/cozystack/stacked/color/cozystack-stacked-color.svg" alt="Cozystack">
  </div>

  <div class="profile-bio">Free and open-source PaaS framework for building clouds</div>

  <div class="links">

    <a href="https://drive.google.com/file/d/1RcGx6ot6yAHarZed5_tVhWFmS9GD3e6m/view?usp=sharing" class="link-btn" target="_blank" rel="noopener">
      <div class="link-icon"><i class="fa-brands fa-google-drive"></i></div>
      <div class="link-text">
        Presentation
        <div class="link-subtitle">Google Drive</div>
      </div>
      <i class="fa-solid fa-chevron-right link-arrow"></i>
    </a>

    <a href="https://github.com/cozystack/cozystack" class="link-btn" target="_blank" rel="noopener">
      <div class="link-icon"><i class="fa-brands fa-github"></i></div>
      <div class="link-text">
        GitHub
        <div class="link-subtitle">cozystack/cozystack</div>
      </div>
      <i class="fa-solid fa-chevron-right link-arrow"></i>
    </a>

    <a href="https://calendar.google.com/calendar?cid=ZTQzZDIxZTVjOWI0NWE5NWYyOGM1ZDY0OWMyY2IxZTFmNDMzZTJlNjUzYjU2ZGJiZGE3NGNhMzA2ZjBkMGY2OEBncm91cC5jYWxlbmRhci5nb29nbGUuY29t" class="link-btn" target="_blank" rel="noopener">
      <div class="link-icon"><i class="fa-regular fa-calendar"></i></div>
      <div class="link-text">Community Meeting Calendar</div>
      <i class="fa-solid fa-chevron-right link-arrow"></i>
    </a>

    <a href="https://kubernetes.slack.com/archives/C06L3CPRVN1" class="link-btn" target="_blank" rel="noopener">
      <div class="link-icon"><i class="fa-brands fa-slack"></i></div>
      <div class="link-text">
        Slack
        <div class="link-subtitle">#cozystack</div>
      </div>
      <i class="fa-solid fa-chevron-right link-arrow"></i>
    </a>

    <a href="https://t.me/cozystack" class="link-btn" target="_blank" rel="noopener">
      <div class="link-icon"><i class="fa-brands fa-telegram"></i></div>
      <div class="link-text">
        Telegram
        <div class="link-subtitle">Community Chat</div>
      </div>
      <i class="fa-solid fa-chevron-right link-arrow"></i>
    </a>

    <a href="https://aenix.io/contact" class="link-btn" target="_blank" rel="noopener">
      <div class="link-icon"><i class="fa-solid fa-briefcase"></i></div>
      <div class="link-text">
        Enterprise Support
        <div class="link-subtitle">Ænix</div>
      </div>
      <i class="fa-solid fa-chevron-right link-arrow"></i>
    </a>

  </div>

  <div class="footer">
    <a href="https://aenix.io">aenix.io</a>
  </div>

</div>

</body>
</html>

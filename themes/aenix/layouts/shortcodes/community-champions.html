<div class="team-grid">
  {{ range .Page.Params.community_champions }}
  {{ $member := . }}
  <div class="team-card">
    {{ with .photo }}
    <div class="team-photo">
      <img src="{{ . }}" alt="{{ $member.name }}" loading="lazy">
    </div>
    {{ end }}
    <h3 class="team-name">{{ .name }}</h3>
    <p class="team-role">{{ .role }}</p>
    {{ with .links }}
    <div class="team-links">
      {{ with .telegram }}<a href="https://t.me/{{ strings.TrimPrefix "@" . }}" target="_blank" rel="noopener">Telegram</a>{{ end }}
      {{ with .github }}<a href="https://github.com/{{ . }}" target="_blank" rel="noopener">GitHub</a>{{ end }}
      {{ with .youtube }}<a href="https://youtube.com/{{ . }}" target="_blank" rel="noopener">YouTube</a>{{ end }}
    </div>
    {{ end }}
  </div>
  {{ end }}
</div>
